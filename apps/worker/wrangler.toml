name = "api-worker"
main = "src/index.ts"
compatibility_date = "2026-02-14"

[vars]
CORS_ORIGIN = "http://localhost:5173"
PROXY_UPSTREAM_TIMEOUT_MS = "30000"
PROXY_STREAM_USAGE_MODE = "lite"
PROXY_STREAM_USAGE_MAX_BYTES = "262144"
PROXY_STREAM_USAGE_MAX_PARSERS = "2"
PROXY_USAGE_QUEUE_ENABLED = "true"

[[d1_databases]]
binding = "DB"
database_name = "api-worker"
database_id = "00000000-0000-0000-0000-000000000000"

[assets]
directory = "../ui/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[durable_objects.bindings]]
name = "CHECKIN_SCHEDULER"
class_name = "CheckinScheduler"

[[queues.producers]]
queue = "usage-events"
binding = "USAGE_QUEUE"

[[queues.consumers]]
queue = "usage-events"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CheckinScheduler"]



