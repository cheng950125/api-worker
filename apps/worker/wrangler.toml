name = "api-worker"
main = "src/index.ts"
compatibility_date = "2026-02-14"

[observability]
enabled = true

[observability.logs]
enabled = true

[placement]
mode = "smart"

[[d1_databases]]
binding = "DB"
database_name = "api-worker"
database_id = "e8bacb0c-93c5-4d15-aa7f-a9688a84b91c"

[[kv_namespaces]]
binding = "KV_HOT"
# Replaced by CI during deployment
id = "a6e1dde134824cb9931795ffa3a1b2d5"

[assets]
directory = "../ui/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[durable_objects.bindings]]
name = "CHECKIN_SCHEDULER"
class_name = "CheckinScheduler"

[[services]]
binding = "ATTEMPT_WORKER"
service = "attempt-worker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CheckinScheduler"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UsageLimiter"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["CacheVersionStore"]

[[migrations]]
tag = "v4"
deleted_classes = ["UsageLimiter"]

[[migrations]]
tag = "v5"
deleted_classes = ["CacheVersionStore"]


